<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍓CYBER GLASSHOUSE🍓</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d94bb5">
</head>
<body>
  <header>
    <h1>ESTUFA AGRINHO</h1>
    <h3>Estufa interativa.</h3>
    <strong>
      <a id="linkagrinho" href="https://www.senar-es.org.br/data/filemanager/uploads/regulamento_agrinho_2025.pdf" target="_blank">
        link das normas
      </a>
    </strong>
  </header>

  <!-- Visualização de dados ao vivo -->
  <div id="dados-estufa">
    <p><strong>Temperatura:</strong> <span id="valor-temp">--</span> °C</p>
    <p><strong>Umidade:</strong> <span id="valor-umid">--</span> %</p>
  </div>

  <script>
    // Registro do Service Worker para ativar PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("✅ Service Worker registrado"))
        .catch(err => console.error("Erro ao registrar SW:", err));
    }

    // Simulador de dados (pode ser trocado por fetch para API da Adafruit IO)
    function simularDados() {
      const temperatura = (20 + Math.random() * 10).toFixed(1);
      const umidade = (40 + Math.random() * 30).toFixed(1);
      document.getElementById('valor-temp').textContent = temperatura;
      document.getElementById('valor-umid').textContent = umidade;
    }
    setInterval(simularDados, 5000);
    simularDados();
  </script>
</body>
</html>
