<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍓CYBER GLASSHOUSE🍓</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/public/manifest.json">
  <meta name="theme-color" content="#d94bb5">
</head>
<body>
  <header>
    <h1>ESTUFA AGRINHO</h1>
    <h3>Estufa interativa.</h3>
  </header>

  <!-- Visualização de dados ao vivo -->
  <div id="dados-estufa">
    <pre id="dados">Carregando dados...</pre>
    <p><strong>Temperatura:</strong> <span id="valor-temp">--</span> °C</p>
    <p><strong>Umidade:</strong> <span id="valor-umid">--</span> %</p>
  </div>

 <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/public/service-worker.js') // ← se o service worker estiver na pasta public
      .then(() => console.log("✅ Service Worker registrado"))
      .catch(err => console.error("Erro ao registrar SW:", err));
  }
</script>

  <script src="script.js"></script>
</body>
</html>
